<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>療癒捏捏雕塑</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1010;
      --panel: #181d1a;
      --panel-2: #232923;
      --line: #3a4239;
      --text: #f8efdd;
      --muted: #bcb19e;
      --accent: #e6bd72;
      --green: #8dc6ad;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0d1010;
      color: var(--text);
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
    }

    button, input { font: inherit; }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(35, 41, 35, .92);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s, transform 0.1s;
      touch-action: manipulation;
    }
    button:hover:not(:disabled) { border-color: rgba(230, 189, 114, .82); }
    button:active:not(:disabled) { transform: scale(0.96); }

    button.primary {
      background: var(--accent);
      border-color: #f2d18b;
      color: #211706;
      font-weight: 760;
    }

    button.ghost {
      background: rgba(16, 19, 19, .58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    button.icon {
      width: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    button:disabled { cursor: not-allowed; opacity: .45; }

    input[type="range"] { width: 100%; accent-color: var(--accent); }

    input[type="file"] {
      position: fixed;
      inset: auto;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .app {
      height: 100%;
      position: relative;
      background:
        radial-gradient(circle at 65% 15%, rgba(230, 189, 114, .12), transparent 32rem),
        linear-gradient(135deg, #0d1010 0%, #161b17 62%, #1e1e17 100%);
    }

    .stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: stretch;
    }

    .camera-stage,
    .sculpt-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: stretch;
      transition: opacity .3s ease, visibility .3s ease, transform .3s ease;
    }

    .camera-stage.inactive,
    .sculpt-stage.inactive {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: scale(0.98);
    }

    .camera-frame,
    .sculpture-shell {
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(248, 239, 221, .12);
      border-radius: 8px;
      overflow: hidden;
      background: #0f1413;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .36);
    }

    video,
    #sculpture {
      width: 100%;
      height: 100%;
      display: block;
    }

    video {
      object-fit: cover;
      transform: scaleX(-1);
      background: #111514;
      filter: grayscale(100%) contrast(150%) brightness(90%);
    }

    #sculpture {
      touch-action: none;
      overscroll-behavior: none;
      cursor: grab;
    }
    #sculpture:active { cursor: grabbing; }

    .camera-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background:
        radial-gradient(circle at 50% 35%, rgba(141, 198, 173, .12), transparent 18rem),
        #111514;
      transition: opacity 0.3s;
    }
    .camera-empty.hidden { opacity: 0; pointer-events: none; }
    .camera-empty b {
      display: block;
      color: var(--text);
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: 0;
      margin-bottom: 6px;
    }
    .camera-empty p {
      margin: 0;
      line-height: 1.6;
      font-size: clamp(14px, 3vw, 16px);
      color: #c9d5cf;
    }

    .hud {
      position: absolute;
      z-index: 20;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }
    .hud > * { pointer-events: auto; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(18px, 2.4vw, 28px);
      letter-spacing: 0;
      line-height: 1;
      text-shadow: 0 2px 20px rgba(0, 0, 0, .45);
      white-space: nowrap;
    }

    .status {
      max-width: min(44vw, 440px);
      color: #dff5ea;
      background: rgba(15, 18, 17, .62);
      border: 1px solid rgba(141, 198, 173, .36);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.3s;
    }

    .camera-actions {
      position: absolute;
      z-index: 18;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shutter {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      padding: 0;
      background: #f7efdf;
      border: 6px solid rgba(230, 189, 114, .68);
      box-shadow: 0 12px 36px rgba(0, 0, 0, .4);
    }
    .shutter:disabled { opacity: .5; }

    .sculpt-actions {
      position: absolute;
      z-index: 18;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .drawer-scrim {
      position: absolute;
      z-index: 28;
      inset: 0;
      background: rgba(0, 0, 0, .38);
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .drawer {
      position: absolute;
      z-index: 30;
      top: 0;
      bottom: 0;
      left: 0;
      width: min(330px, calc(100vw - 38px));
      padding: max(16px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
      background: rgba(16, 19, 18, .96);
      border-right: 1px solid rgba(248, 239, 221, .1);
      transform: translateX(-104%);
      transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 13px;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 24px 0 80px rgba(0, 0, 0, .4);
    }

    body.drawer-open .drawer { transform: translateX(0); }
    body.drawer-open .drawer-scrim { opacity: 1; pointer-events: auto; }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .drawer-head strong { font-size: 18px; }

    .section {
      display: grid;
      gap: 9px;
      border-top: 1px solid rgba(248, 239, 221, .08);
      padding-top: 12px;
    }
    .section-title {
      color: #eadfc9;
      font-size: 13px;
      font-weight: 760;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .control {
      display: grid;
      grid-template-columns: 54px 1fr 34px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }
    .control output {
      color: #eee0c4;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .material-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .swatch {
      height: 36px;
      border: 2px solid rgba(255, 255, 255, .16);
      box-shadow: inset 0 -12px 20px rgba(0, 0, 0, .18);
      border-radius: 4px;
    }
    .swatch.active {
      border-color: var(--accent);
      outline: 2px solid rgba(230, 189, 114, .25);
    }

    #sourceCanvas { display: none; }

    @media (max-width: 720px) {
      .camera-frame,
      .sculpture-shell {
        inset: 0;
        border-radius: 0;
        border: 0;
      }
      .status { display: none; }
      .brand { max-width: calc(100vw - 78px); }
      h1 { font-size: 18px; }
      .camera-actions,
      .sculpt-actions {
        width: calc(100% - 28px);
        justify-content: center;
      }
      .camera-actions button:not(.shutter),
      .sculpt-actions button {
        flex: 1;
        max-width: 128px;
      }
      .shutter {
        flex: 0 0 auto;
        width: 70px;
        height: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage">
      <section id="cameraStage" class="camera-stage">
        <div class="camera-frame">
          <video id="video" playsinline muted style="display: none;"></video>
          <div id="cameraEmpty" class="camera-empty">
            <div>
              <b>先拍一張</b>
              <p>拍攝清晰的主體,並保持背景乾淨。<br>黑白明暗對比越強烈,浮雕越立體!</p>
            </div>
          </div>
        </div>
        <div class="camera-actions">
          <button id="openFile" class="ghost">相簿</button>
          <button id="snapPhoto" class="shutter" aria-label="拍照" disabled></button>
          <button id="startCamera" class="ghost">鏡頭</button>
        </div>
      </section>

      <section id="sculptStage" class="sculpt-stage inactive">
        <div class="sculpture-shell">
          <canvas id="sculpture"></canvas>
        </div>
        <div class="sculpt-actions">
          <button id="newPhoto" class="ghost">換照片</button>
          <button id="downloadPng" class="ghost" disabled>下載</button>
        </div>
      </section>
    </div>

    <div class="hud">
      <div class="brand">
        <button id="openDrawer" class="icon ghost" aria-label="打開設定">☰</button>
        <h1>療癒捏捏雕塑</h1>
      </div>
      <div id="status" class="status">開鏡頭或選照片</div>
    </div>

    <div id="drawerScrim" class="drawer-scrim"></div>
    <aside class="drawer" aria-label="設定">
      <div class="drawer-head">
        <strong>設定</strong>
        <button id="closeDrawer" class="icon" aria-label="關閉">×</button>
      </div>

      <section class="section">
        <div class="section-title">照片</div>
        <div class="row">
          <button id="drawerCamera">開鏡頭</button>
          <button id="drawerFile">選照片</button>
        </div>
        <button id="randomSample">試玩範例</button>
      </section>

      <section class="section">
        <div class="section-title">手感</div>
        <label class="control">力道 <input id="strength" type="range" min="1" max="100" value="78"><output id="strengthOut">78</output></label>
        <label class="control">範圍 <input id="radius" type="range" min="3" max="32" value="14"><output id="radiusOut">14</output></label>
        <label class="control">回彈 <input id="bounce" type="range" min="0" max="100" value="88"><output id="bounceOut">88</output></label>
        <label class="control">浮雕 <input id="relief" type="range" min="20" max="200" value="125"><output id="reliefOut">125</output></label>
        <label class="control">光線 <input id="light" type="range" min="-80" max="80" value="-32"><output id="lightOut">-32</output></label>
      </section>

      <section class="section">
        <div class="section-title">材質</div>
        <div class="material-row">
          <button class="swatch active" data-color="#ff9b9b" style="background:#ff9b9b" title="草莓果凍"></button>
          <button class="swatch" data-color="#9be0ff" style="background:#9be0ff" title="汽水果凍"></button>
          <button class="swatch" data-color="#b99361" style="background:#b99361" title="陶土"></button>
          <button class="swatch" data-color="#d2c7b1" style="background:#d2c7b1" title="石膏"></button>
          <button class="swatch" data-color="#8fb8a8" style="background:#8fb8a8" title="青瓷"></button>
        </div>
      </section>

      <section class="section">
        <div class="row">
          <button id="resetSculpture" disabled>重置</button>
          <button id="drawerDownload" disabled>下載</button>
        </div>
      </section>
    </aside>

    <input id="fileInput" type="file" accept="image/*">
    <canvas id="sourceCanvas"></canvas>
  </div>

  <script>
    const gridW = 100;
    const gridH = 100;
    const totalPoints = gridW * gridH;

    // DOM Elements
    const sculpture = document.querySelector("#sculpture");
    const ctx = sculpture.getContext("2d", { alpha: false });
    const video = document.querySelector("#video");
    const sourceCanvas = document.querySelector("#sourceCanvas");
    const sourceCtx = sourceCanvas.getContext("2d", { willReadFrequently: true });

    const ui = {
      cameraStage: document.querySelector("#cameraStage"),
      sculptStage: document.querySelector("#sculptStage"),
      cameraEmpty: document.querySelector("#cameraEmpty"),
      status: document.querySelector("#status"),
      startCamera: document.querySelector("#startCamera"),
      drawerCamera: document.querySelector("#drawerCamera"),
      snapPhoto: document.querySelector("#snapPhoto"),
      openFile: document.querySelector("#openFile"),
      drawerFile: document.querySelector("#drawerFile"),
      fileInput: document.querySelector("#fileInput"),
      randomSample: document.querySelector("#randomSample"),
      newPhoto: document.querySelector("#newPhoto"),
      resetSculpture: document.querySelector("#resetSculpture"),
      downloadPng: document.querySelector("#downloadPng"),
      drawerDownload: document.querySelector("#drawerDownload"),
      openDrawer: document.querySelector("#openDrawer"),
      closeDrawer: document.querySelector("#closeDrawer"),
      drawerScrim: document.querySelector("#drawerScrim"),
      strength: document.querySelector("#strength"),
      radius: document.querySelector("#radius"),
      bounce: document.querySelector("#bounce"),
      relief: document.querySelector("#relief"),
      light: document.querySelector("#light"),
      swatches: [...document.querySelectorAll(".swatch")]
    };

    // State
    let heights = new Float32Array(totalPoints);
    let baseHeights = new Float32Array(totalPoints);
    let velocity = new Float32Array(totalPoints);
    let hasSculpture = false;
    let material = hexToRgb("#ff9b9b");

    // ★ 改成完全平視:angle = 0、tilt = 1.0 (Y 軸不再壓縮)
    const angle = 0;
    const tilt = 1.0;

    let drag = null;
    let cursorPos = null; // ★ 新增:目前指尖/滑鼠在 canvas 上的位置,用來繪製手指環指示器
    let cameraStream = null;

    // Object Pooling
    const pointCache = new Array(totalPoints);
    for (let i = 0; i < totalPoints; i++) {
      pointCache[i] = { x: 0, y: 0, z: 0, gx: i % gridW, gy: Math.floor(i / gridW), depth: 0 };
    }

    const cellsCache = new Array((gridW - 1) * (gridH - 1));
    for (let i = 0; i < cellsCache.length; i++) {
      cellsCache[i] = { p1: null, p2: null, p3: null, p4: null, depth: 0, nx: 0, ny: 0, avgZ: 0 };
    }

    // Initialization
    bindRange(ui.strength, "#strengthOut");
    bindRange(ui.radius, "#radiusOut");
    bindRange(ui.bounce, "#bounceOut");
    bindRange(ui.relief, "#reliefOut", render);
    bindRange(ui.light, "#lightOut", render);

    function bindRange(input, outputSelector, onInput = null) {
      const output = document.querySelector(outputSelector);
      const sync = () => {
        output.value = input.value;
        if (onInput && hasSculpture) onInput();
      };
      input.addEventListener("input", sync);
      sync();
    }

    function setStatus(text) {
      ui.status.textContent = text;
    }

    function toggleSettings(forceOpen) {
      if (forceOpen === undefined) {
        document.body.classList.toggle("drawer-open");
      } else {
        document.body.classList[forceOpen ? 'add' : 'remove']("drawer-open");
      }
    }

    // Event Listeners
    ui.openDrawer.addEventListener("click", () => toggleSettings(true));
    ui.closeDrawer.addEventListener("click", () => toggleSettings(false));
    ui.drawerScrim.addEventListener("click", () => toggleSettings(false));

    ui.startCamera.addEventListener("click", startCameraStream);
    ui.drawerCamera.addEventListener("click", () => {
      toggleSettings(false);
      showCamera();
      startCameraStream();
    });

    ui.openFile.addEventListener("click", () => ui.fileInput.click());
    ui.drawerFile.addEventListener("click", () => {
      toggleSettings(false);
      ui.fileInput.click();
    });

    ui.newPhoto.addEventListener("click", showCamera);

    ui.snapPhoto.addEventListener("click", () => {
      if (!video.videoWidth) return;
      drawSource(video, video.videoWidth, video.videoHeight, true);
      buildSculpture("照片已經轉為立體浮雕");
    });

    ui.fileInput.addEventListener("change", () => {
      const file = ui.fileInput.files?.[0];
      if (!file) return;
      setStatus("處理圖片中...");
      const img = new Image();
      img.onload = () => {
        drawSource(img, img.naturalWidth, img.naturalHeight, false);
        buildSculpture("圖片已經轉為立體浮雕");
        URL.revokeObjectURL(img.src);
        ui.fileInput.value = "";
      };
      img.src = URL.createObjectURL(file);
    });

    ui.randomSample.addEventListener("click", () => {
      toggleSettings(false);
      makeSampleImage();
      buildSculpture("範例載入完成,試著捏捏看吧!");
    });

    ui.resetSculpture.addEventListener("click", () => {
      heights.set(baseHeights);
      velocity.fill(0);
      render();
      setStatus("已恢復原狀");
      toggleSettings(false);
    });

    ui.downloadPng.addEventListener("click", downloadImage);
    ui.drawerDownload.addEventListener("click", () => {
      toggleSettings(false);
      downloadImage();
    });

    ui.swatches.forEach((button) => {
      button.addEventListener("click", () => {
        ui.swatches.forEach((item) => item.classList.toggle("active", item === button));
        material = hexToRgb(button.dataset.color);
        render();
      });
    });

    // Core Logic
    async function startCameraStream() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 960 } },
          audio: false
        });
        video.srcObject = cameraStream;
        await video.play();
        video.style.display = "block";
        ui.cameraEmpty.classList.add("hidden");
        ui.snapPhoto.disabled = false;
        setStatus("請將主體置中對焦,按下快門拍照");
      } catch (error) {
        setStatus("無法存取相機,請嘗試選擇相簿照片");
      }
    }

    function showCamera() {
      ui.cameraStage.classList.remove("inactive");
      ui.sculptStage.classList.add("inactive");
      setStatus("開啟鏡頭或選擇照片");
      requestAnimationFrame(resizeCanvas);
    }

    function showSculpture() {
      ui.cameraStage.classList.add("inactive");
      ui.sculptStage.classList.remove("inactive");
      requestAnimationFrame(resizeCanvas);
    }

    function drawSource(drawable, width, height, mirrored) {
      const targetW = 560;
      const targetH = 420;
      sourceCanvas.width = targetW;
      sourceCanvas.height = targetH;
      sourceCtx.fillStyle = "#111";
      sourceCtx.fillRect(0, 0, targetW, targetH);
      const scale = Math.max(targetW / width, targetH / height);
      const dw = width * scale;
      const dh = height * scale;

      sourceCtx.save();
      if (mirrored) {
        sourceCtx.translate(targetW, 0);
        sourceCtx.scale(-1, 1);
      }
      sourceCtx.drawImage(drawable, (targetW - dw) / 2, (targetH - dh) / 2, dw, dh);
      sourceCtx.restore();

      if (cameraStream) {
        cameraStream.getTracks().forEach((track) => track.stop());
        cameraStream = null;
        video.style.display = "none";
      }
    }

    function makeSampleImage() {
      sourceCanvas.width = 560;
      sourceCanvas.height = 420;
      const g = sourceCtx.createLinearGradient(0, 0, 560, 420);
      g.addColorStop(0, "#efe2c9");
      g.addColorStop(.55, "#91a196");
      g.addColorStop(1, "#353d38");
      sourceCtx.fillStyle = g;
      sourceCtx.fillRect(0, 0, 560, 420);

      sourceCtx.save();
      sourceCtx.translate(280, 214);
      sourceCtx.fillStyle = "#d8c29f";
      sourceCtx.beginPath();
      sourceCtx.ellipse(0, -8, 104, 134, 0, 0, Math.PI * 2);
      sourceCtx.fill();
      sourceCtx.fillStyle = "#55483e";
      sourceCtx.beginPath();
      sourceCtx.ellipse(-38, -30, 13, 8, 0, 0, Math.PI * 2);
      sourceCtx.ellipse(38, -30, 13, 8, 0, 0, Math.PI * 2);
      sourceCtx.fill();
      sourceCtx.strokeStyle = "#765d4b";
      sourceCtx.lineWidth = 7;
      sourceCtx.lineCap = "round";
      sourceCtx.beginPath();
      sourceCtx.moveTo(-18, 32);
      sourceCtx.quadraticCurveTo(0, 48, 27, 31);
      sourceCtx.stroke();
      sourceCtx.strokeStyle = "#96735c";
      sourceCtx.beginPath();
      sourceCtx.moveTo(0, -14);
      sourceCtx.quadraticCurveTo(-10, 12, 8, 18);
      sourceCtx.stroke();
      sourceCtx.fillStyle = "#4c4137";
      sourceCtx.beginPath();
      sourceCtx.ellipse(0, -116, 96, 36, 0, Math.PI, Math.PI * 2);
      sourceCtx.fill();
      sourceCtx.restore();
    }

    function buildSculpture(message) {
      createHeightMapFromSource();
      hasSculpture = true;
      ui.resetSculpture.disabled = false;
      ui.downloadPng.disabled = false;
      ui.drawerDownload.disabled = false;
      showSculpture();
      setStatus(message);
      render();
    }

    function createHeightMapFromSource() {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = gridW;
      tempCanvas.height = gridH;
      const tctx = tempCanvas.getContext("2d", { willReadFrequently: true });
      tctx.drawImage(sourceCanvas, 0, 0, gridW, gridH);

      const imgData = tctx.getImageData(0, 0, gridW, gridH).data;
      const gray = new Float32Array(totalPoints);

      // ★ 對比度增強:讓暗的更暗、亮的更亮,提升浮雕的層次
      for (let i = 0; i < totalPoints; i++) {
        const idx = i * 4;
        let g = (imgData[idx] * .2126 + imgData[idx + 1] * .7152 + imgData[idx + 2] * .0722) / 255;
        // S-curve 對比強化
        g = g < 0.5
          ? 2 * g * g
          : 1 - 2 * (1 - g) * (1 - g);
        gray[i] = g;
      }

      // ★ 改進的高度生成:平衡圓頂(讓物件像浮起的麵團)+ 灰階(主要立體感)+ 邊緣強化(輪廓清晰)
      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const i = y * gridW + x;
          const gx = sample(gray, x + 1, y) - sample(gray, x - 1, y);
          const gy = sample(gray, x, y + 1) - sample(gray, x, y - 1);

          const edgeMag = Math.sqrt(gx * gx + gy * gy);
          const edge = Math.min(1, edgeMag * 4.5);

          const dx = (x / (gridW - 1) - .5) * 2;
          const dy = (y / (gridH - 1) - .5) * 2;
          const dist = Math.sqrt(dx * dx + dy * dy);

          // 圓頂:用 (1 - dist^2) 而非 cos,基底更厚實,邊緣更柔順
          let dome = 0;
          if (dist < 1) {
            const t = 1 - dist * dist;
            dome = t * t; // 平方一次得到更圓潤的橢球
          }

          // 增加灰階權重(從 0.7 → 0.95),浮雕細節更明顯
          heights[i] = dome * 0.55 + (gray[i] - 0.42) * 0.95 + edge * 0.22;
        }
      }

      // ★ 四段式平滑:多一輪輕度模糊,徹底消除網格間的色斑感,但因為解析度沒變所以不會延遲
      for (let pass = 0; pass < 4; pass++) blurHeights(heights, .35);

      baseHeights.set(heights);
      velocity.fill(0);
    }

    function sample(arr, x, y) {
      x = Math.max(0, Math.min(gridW - 1, x));
      y = Math.max(0, Math.min(gridH - 1, y));
      return arr[y * gridW + x];
    }

    function blurHeights(arr, amount) {
      const copy = new Float32Array(arr);
      const invAmount = 1 - amount;
      for (let y = 1; y < gridH - 1; y++) {
        const rowOffset = y * gridW;
        for (let x = 1; x < gridW - 1; x++) {
          const i = rowOffset + x;
          const sum = copy[i] * 4 +
                      copy[i - 1] + copy[i + 1] +
                      copy[i - gridW] + copy[i + gridW] +
                      copy[i - gridW - 1] + copy[i - gridW + 1] +
                      copy[i + gridW - 1] + copy[i + gridW + 1];
          arr[i] = copy[i] * invAmount + (sum / 12) * amount;
        }
      }
    }

    function resizeCanvas() {
      const rect = sculpture.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;

      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = Math.max(320, Math.floor(rect.width * dpr));
      const h = Math.max(320, Math.floor(rect.height * dpr));

      if (sculpture.width !== w || sculpture.height !== h) {
        sculpture.width = w;
        sculpture.height = h;
        render();
      }
    }

    window.addEventListener("resize", resizeCanvas);
    requestAnimationFrame(resizeCanvas);

    // Interaction handlers
    sculpture.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      if (!hasSculpture) return;
      sculpture.setPointerCapture(event.pointerId);
      const point = toCanvasPoint(event);
      drag = { lastX: point.x, lastY: point.y, startedAt: performance.now() };
      cursorPos = { x: point.x, y: point.y };
      applyUnifiedTool(point.x, point.y, 0, 0, true);
    });

    sculpture.addEventListener("pointermove", (event) => {
      event.preventDefault();
      if (!drag || !hasSculpture) return;
      const point = toCanvasPoint(event);
      const dx = point.x - drag.lastX;
      const dy = point.y - drag.lastY;

      applyUnifiedTool(point.x, point.y, dx, dy, false);

      drag.lastX = point.x;
      drag.lastY = point.y;
      cursorPos = { x: point.x, y: point.y };
    });

    sculpture.addEventListener("pointerup", (event) => {
      event.preventDefault();
      drag = null;
      cursorPos = null;
      render();
    });

    sculpture.addEventListener("pointercancel", (event) => {
      event.preventDefault();
      drag = null;
      cursorPos = null;
      render();
    });

    function toCanvasPoint(event) {
      const rect = sculpture.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * sculpture.width / rect.width,
        y: (event.clientY - rect.top) * sculpture.height / rect.height
      };
    }

    // ★ 改進的捏壓:加入體積守恆 (按下中心、外環微微鼓起),減少干擾性平滑
    function applyUnifiedTool(px, py, dx, dy, isPress) {
      const nearest = nearestGridPoint(px, py);
      if (!nearest) return;

      const r = Number(ui.radius.value);
      const r2 = r * r;
      const power = (Number(ui.strength.value) / 100) * 1.8;

      const dist2 = dx * dx + dy * dy;
      const dist = Math.sqrt(dist2);
      const motion = Math.min(1, dist / 28);

      const dirX = dist === 0 ? 0 : dx / dist;
      const dirY = dist === 0 ? 0 : dy / dist;

      const yStart = Math.max(1, nearest.gy - r);
      const yEnd = Math.min(gridH - 1, nearest.gy + r);
      const xStart = Math.max(1, nearest.gx - r);
      const xEnd = Math.min(gridW - 1, nearest.gx + r);

      for (let y = yStart; y < yEnd; y++) {
        const rowOffset = y * gridW;
        for (let x = xStart; x < xEnd; x++) {
          const localX = x - nearest.gx;
          const localY = y - nearest.gy;

          const d2 = localX * localX + localY * localY;
          if (d2 > r2) continue;

          const d = Math.sqrt(d2);
          const u = d / r; // 0 中心 → 1 邊緣

          // 主要按壓 (鐘形曲線:中心最強,邊緣 0)
          const press = (Math.cos(u * Math.PI) + 1) * 0.5;

          // ★ 體積守恆:外環會微微鼓起 (sin 曲線在 u=0 與 u=1 時為 0,u=0.5 時為峰值)
          const ringBulge = Math.sin(u * Math.PI);

          const i = rowOffset + x;

          // 行進方向的「前緣推擠」
          const front = localX * dirX + localY * dirY;
          const rim = Math.max(0, front / Math.max(1, r));

          const pressAmount = (isPress ? 0.22 : 0.14) * power * press;
          const bulgeAmount = (isPress ? 0.07 : 0.045) * power * ringBulge;
          const rimAmount = rim * motion * power * press * 0.16;

          heights[i] -= pressAmount;
          heights[i] += bulgeAmount;
          heights[i] += rimAmount;

          // ★ 大幅降低互動時的平滑量(從 .08 + motion*.28 → .04 + motion*.12)
          // 保留更多用戶輸入細節,讓捏的痕跡看得見
          const neighbors = (heights[i - 1] + heights[i + 1] + heights[i - gridW] + heights[i + gridW]) * 0.25;
          const smoothing = press * (0.04 + motion * 0.12);
          heights[i] = heights[i] * (1 - smoothing) + neighbors * smoothing;

          // 賦予點上向下與向外的初速,讓回彈更有彈性
          velocity[i] -= power * press * 0.032;
          velocity[i] += ringBulge * power * 0.012;
          velocity[i] += rim * motion * power * press * 0.018;
          velocity[i] *= 0.95;

          heights[i] = Math.max(-0.85, Math.min(1.45, heights[i]));
        }
      }
      render();
    }

    function nearestGridPoint(px, py) {
      let best = null;
      let bestD2 = Infinity;

      for (let i = 0; i < totalPoints; i += 2) {
        const point = pointCache[i];
        if (!point) continue;
        const dx = point.x - px;
        const dy = point.y - py;
        const d2 = dx * dx + dy * dy;

        if (d2 < bestD2) {
          bestD2 = d2;
          best = point;
        }
      }
      const threshold = Math.max(sculpture.width, sculpture.height) * .15;
      return bestD2 < (threshold * threshold) ? best : null;
    }

    function tickElasticity() {
      if (!hasSculpture) return false;
      const spring = Number(ui.bounce.value) / 100;
      if (spring <= 0) return false;

      const k = .010 + spring * .046;
      const damping = .80 + spring * .19;
      let moving = false;

      for (let i = 0; i < totalPoints; i++) {
        const diff = baseHeights[i] - heights[i];
        const force = diff * k;
        velocity[i] = (velocity[i] + force) * damping;
        heights[i] += velocity[i];

        if ((velocity[i] < 0 ? -velocity[i] : velocity[i]) > .00003 ||
            (diff < 0 ? -diff : diff) > .0003) {
          moving = true;
        }
      }
      return moving;
    }

    // ★ 完全改寫的渲染函數:Phong-style 光照 + 真正的圓形 clip + 零 Y 軸位移
    function render(force = false) {
      if (!sculpture.width || !sculpture.height) return;

      // 背景
      ctx.fillStyle = "#0f1413";
      ctx.fillRect(0, 0, sculpture.width, sculpture.height);
      drawBackdrop();

      if (!hasSculpture && !force) return;

      // ★ 整體更大 (0.0078 → 0.0090),雕塑佔畫面更滿
      const scale = Math.min(sculpture.width, sculpture.height) * .0090;
      // ★ Y 軸視覺位移幾乎歸零 (.06 → .015),邊緣不會有階梯狀凸起
      // 立體感 100% 由 Phong 光照承擔(像現代遊戲的 normal map 技術)
      const visualZScale = Number(ui.relief.value) * scale * .015;
      const cx = sculpture.width * 0.5;
      const cy = sculpture.height * 0.5;

      // ★ 雕塑半徑 — 一個明確的數字,後面 clip 和 cells 都用同一個
      const sculptRadius = scale * gridW * 0.5 * 0.98;

      // 投影到畫布:X、Y 軸完全同比例,正圓
      for (let y = 0; y < gridH; y++) {
        const ny = y - gridH * 0.5;
        const rowOffset = y * gridW;
        for (let x = 0; x < gridW; x++) {
          const nx = x - gridW * 0.5;
          const idx = rowOffset + x;
          const h = heights[idx];
          const p = pointCache[idx];

          p.x = cx + nx * scale;
          p.y = cy + ny * scale - h * visualZScale;
          p.z = h;
          p.depth = ny + h * 18;
        }
      }

      // 軟陰影 (畫在主體下方,clip 之外)
      drawSoftShadow(cx, cy + sculptRadius * 0.92, sculptRadius * 1.05);

      // ★ 關鍵改動:用真實圓形 path 做 clip,所有 cells 在這個 clip 內渲染
      // 邊緣由 Canvas 自身的抗鋸齒處理,完全平滑、沒有鋸齒輪廓
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, sculptRadius, 0, Math.PI * 2);
      ctx.clip();

      // 收集所有 cells(不再逐格判斷遮罩,讓 clip 處理邊界)
      let activeCellCount = 0;
      for (let y = 0; y < gridH - 1; y++) {
        const rowOffset = y * gridW;
        const nextRowOffset = (y + 1) * gridW;
        for (let x = 0; x < gridW - 1; x++) {
          // 只跳過明顯在圓外的格子(粗略加速,精細邊界交給 clip)
          const nx = (x - gridW * 0.5 + 0.5) / (gridW * 0.5);
          const ny = (y - gridH * 0.5 + 0.5) / (gridH * 0.5);
          if (nx * nx + ny * ny > 1.05) continue;

          const c = cellsCache[activeCellCount++];
          c.p1 = pointCache[rowOffset + x];
          c.p2 = pointCache[rowOffset + x + 1];
          c.p3 = pointCache[nextRowOffset + x + 1];
          c.p4 = pointCache[nextRowOffset + x];
          c.depth = (c.p1.depth + c.p2.depth + c.p3.depth + c.p4.depth) * 0.25;
          c.avgZ = (c.p1.z + c.p2.z + c.p3.z + c.p4.z) * 0.25;
        }
      }

      for (let i = activeCellCount; i < cellsCache.length; i++) {
        cellsCache[i].depth = 999999;
      }

      cellsCache.sort((a, b) => a.depth - b.depth);

      // 光源計算
      const lightX = Number(ui.light.value) / 100;
      const lightDirX = -0.55 + lightX * 0.85;
      const lightDirY = -0.85;
      const lightDirZ = 0.62;
      const lightLen = Math.sqrt(lightDirX * lightDirX + lightDirY * lightDirY + lightDirZ * lightDirZ);
      const lx = lightDirX / lightLen;
      const ly = lightDirY / lightLen;
      const lz = lightDirZ / lightLen;

      // 半向量 H
      const hx = lx * 0.5;
      const hy = ly * 0.5;
      const hz = (lz + 1) * 0.5;
      const hLen = Math.sqrt(hx * hx + hy * hy + hz * hz);
      const hxN = hx / hLen;
      const hyN = hy / hLen;
      const hzN = hz / hLen;

      // ★ 法線強度再加強 (5.8 → 7.2),補償降低的位移,立體感更戲劇化
      const normalStrength = 7.2 + Number(ui.relief.value) * 0.038;

      ctx.lineWidth = 1.4;
      ctx.lineJoin = 'round';

      for (let i = 0; i < activeCellCount; i++) {
        const cell = cellsCache[i];

        // 法線梯度 (兩條對角線平均,取得局部坡度)
        const gx = ((cell.p2.z - cell.p1.z) + (cell.p3.z - cell.p4.z)) * 0.5 * normalStrength;
        const gy = ((cell.p4.z - cell.p1.z) + (cell.p3.z - cell.p2.z)) * 0.5 * normalStrength;

        // 法向量近似 N = (-gx, -gy, 1) / |N|
        const nLenSq = gx * gx + gy * gy + 1;
        const invNLen = 1 / Math.sqrt(nLenSq);
        const nxN = -gx * invNLen;
        const nyN = -gy * invNLen;
        const nzN = invNLen;

        // 漫反射 N·L
        const NdotL = nxN * lx + nyN * ly + nzN * lz;
        const diffuse = Math.max(0, NdotL);

        // 鏡面反射 (Blinn-Phong) N·H,集中高光
        const NdotH = Math.max(0, nxN * hxN + nyN * hyN + nzN * hzN);
        const specular = Math.pow(NdotH, 28) * 0.55;

        // 弱型環境遮蔽:深度為負(凹陷)的地方加深陰影
        const ao = cell.avgZ < 0 ? cell.avgZ * 0.35 : 0;

        // 邊緣襯托(rim light):法線越偏離 z 軸,越亮一點點(像果凍透光感)
        const rim = (1 - nzN) * (1 - nzN) * 0.08;

        // 組合最終色調
        const ambient = -0.18;
        const shade = ambient + diffuse * 0.78 + specular + ao + rim;

        const clampedShade = Math.max(-0.72, Math.min(0.96, shade));
        const fillColor = shadeColor(material, clampedShade);

        ctx.beginPath();
        ctx.moveTo(cell.p1.x, cell.p1.y);
        ctx.lineTo(cell.p2.x, cell.p2.y);
        ctx.lineTo(cell.p3.x, cell.p3.y);
        ctx.lineTo(cell.p4.x, cell.p4.y);
        ctx.closePath();
        // ★ 同色 fill + stroke:讓格子接縫的鋸齒邊緣被自身顏色蓋掉,
        // 視覺上會像一塊抗鋸齒的連續曲面,但完全不需要增加 grid 解析度
        ctx.fillStyle = fillColor;
        ctx.strokeStyle = fillColor;
        ctx.fill();
        ctx.stroke();
      }

      // ★ Pass 2:在最亮的峰頂加一層極淡的高光 (果凍光澤感) — 仍在 clip 內
      drawTopHighlights(activeCellCount);

      // ★ 結束 clip,後面的指示器可以畫到圓外
      ctx.restore();

      // ★ Pass 3:加上一圈邊緣光暈,讓圓的輪廓有「微微透光」的果凍邊緣感
      drawEdgeGlow(cx, cy, sculptRadius);

      // ★ Pass 4:指尖位置指示器(畫在所有東西之上)
      if (cursorPos && drag) {
        drawCursorRing();
      }
    }

    // ★ 新增:沿著雕塑邊緣繪製一圈非常淡的光暈,模擬果凍邊緣的次表面散射
    function drawEdgeGlow(cx, cy, radius) {
      ctx.save();
      ctx.strokeStyle = `rgba(${material.r}, ${material.g}, ${material.b}, 0.45)`;
      ctx.lineWidth = Math.max(1.5, radius * 0.012);
      ctx.beginPath();
      ctx.arc(cx, cy, radius - ctx.lineWidth * 0.5, 0, Math.PI * 2);
      ctx.stroke();

      // 再加一圈更外更淡的光暈
      ctx.strokeStyle = `rgba(${material.r}, ${material.g}, ${material.b}, 0.12)`;
      ctx.lineWidth = Math.max(2, radius * 0.025);
      ctx.beginPath();
      ctx.arc(cx, cy, radius + ctx.lineWidth * 0.3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawBackdrop() {
      const w = sculpture.width;
      const h = sculpture.height;
      const grd = ctx.createRadialGradient(w * .52, h * .35, 20, w * .52, h * .42, w * .78);
      grd.addColorStop(0, "#1e2620");
      grd.addColorStop(0.7, "#121615");
      grd.addColorStop(1, "#0a0d0c");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSoftShadow(x, y, radius) {
      ctx.save();
      const grd = ctx.createRadialGradient(x, y, 0, x, y, radius);
      grd.addColorStop(0, "rgba(0, 0, 0, .35)");
      grd.addColorStop(0.6, "rgba(0, 0, 0, .12)");
      grd.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.ellipse(x, y, radius, radius * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawTopHighlights(activeCellCount) {
      ctx.save();
      ctx.globalAlpha = 0.05;
      ctx.fillStyle = "#fff6e0";
      for (let i = 0; i < activeCellCount; i++) {
        const c = cellsCache[i];
        // ★ 門檻拉很高 (0.6 → 0.8),只在真正凸起的部分閃光,避免到處都是亮斑
        if (c.avgZ < 0.8) continue;
        ctx.beginPath();
        ctx.moveTo(c.p1.x, c.p1.y);
        ctx.lineTo(c.p2.x, c.p2.y);
        ctx.lineTo(c.p3.x, c.p3.y);
        ctx.lineTo(c.p4.x, c.p4.y);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    // ★ 新增:繪製操作位置的環形指示器,讓使用者清楚知道捏的範圍
    function drawCursorRing() {
      if (!cursorPos) return;
      const r = Number(ui.radius.value);
      const scale = Math.min(sculpture.width, sculpture.height) * .0072 * 1.45;
      const visualR = r * scale;

      ctx.save();
      // 內圈柔光
      const grd = ctx.createRadialGradient(cursorPos.x, cursorPos.y, 0, cursorPos.x, cursorPos.y, visualR);
      grd.addColorStop(0, "rgba(255, 245, 220, 0.18)");
      grd.addColorStop(0.7, "rgba(255, 245, 220, 0.04)");
      grd.addColorStop(1, "rgba(255, 245, 220, 0)");
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cursorPos.x, cursorPos.y, visualR, 0, Math.PI * 2);
      ctx.fill();

      // 外環細線
      ctx.strokeStyle = "rgba(255, 240, 210, 0.55)";
      ctx.lineWidth = Math.max(1.5, sculpture.width / 700);
      ctx.beginPath();
      ctx.arc(cursorPos.x, cursorPos.y, visualR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function downloadImage() {
      // 下載前暫時清掉指示器
      const tmpCursor = cursorPos;
      cursorPos = null;
      render(true);
      cursorPos = tmpCursor;

      const link = document.createElement("a");
      link.download = "healing-sculpture.png";
      link.href = sculpture.toDataURL("image/png");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function shadeColor(rgb, shade) {
      const amount = shade >= 0 ? 255 : 0;
      const mix = shade < 0 ? -shade : shade;
      return `rgb(${Math.round(rgb.r + (amount - rgb.r) * mix)}, ${Math.round(rgb.g + (amount - rgb.g) * mix)}, ${Math.round(rgb.b + (amount - rgb.b) * mix)})`;
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {
        r: parseInt(clean.slice(0, 2), 16),
        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };
    }

    function animate() {
      if (hasSculpture) {
        const moving = tickElasticity();
        if (moving || drag) {
          render();
        }
      }
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
